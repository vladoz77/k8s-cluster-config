apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
  labels:
    app: cert-manager
spec:
  project: infrastructure
  sources:
  - repoURL: quay.io/jetstack/charts
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      releaseName: cert-manager
      parameters:
        - name: crds.enabled
          value: "true"
        - name: config.enableGatewayAPI
          value: "true"
  - repoURL: quay.io/jetstack/charts
    chart: trust-manager
    targetRevision: 0.22.1
    helm:
      releaseName: trust-manager
  - repoURL: https://github.com/vladoz77/k8s-cluster-config.git
    targetRevision: HEAD 
    path: infrastructure/certmanager/manifests
  destination:
    server: "https://kubernetes.default.svc"
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
