apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
  labels:
    app: argocd
spec:
  project: infrastructure
  sources:
  - repoURL: https://github.com/vladoz77/k8s-cluster-config.git
    targetRevision: HEAD 
    ref: myRepo
  - repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: v2.2.5 
    helm:
      valueFiles:
        - $myRepo/infrastructure/argocd/values.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true